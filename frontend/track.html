<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShipTrack — Track Shipment</title>
  <link rel="stylesheet" href="./allStyles.css"/>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">▲ ShipTrack</a>
  <div class="nav-links">
    <a href="index.html"   class="nav-link">Home</a>
    <a href="create.html"  class="nav-link">Create</a>
    <a href="track.html"   class="nav-link active">Track</a>
    <a href="history.html" class="nav-link">History</a>
    <a href="admin.html"   class="nav-link">Admin</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">Track Shipment</div>
  <div class="page-sub">Enter your tracking ID to see live status</div>

  <div class="card" style="max-width:540px; margin-bottom:20px;">
    <div style="display:flex; gap:10px;">
      <input id="trackInput" class="form-input" style="flex:1;"
             placeholder="e.g. TRK-A3F9D12B"
             onkeydown="if(event.key==='Enter') trackShipment()" />
      <button class="btn-secondary" onclick="trackShipment()">Track</button>
    </div>
  </div>

  <div id="error-box" class="alert-error" style="display:none;"></div>

  <div id="result" style="display:none;" class="card" style="max-width:540px;">
    <div style="display:flex; justify-content:space-between; align-items:center;
                margin-bottom:18px; flex-wrap:wrap; gap:10px;">
      <div>
        <div style="font-size:12px; color:var(--t3); margin-bottom:4px;">Tracking ID</div>
        <div id="r-tid" style="font-family:monospace; font-size:18px;
             color:var(--p1); font-weight:700;"></div>
      </div>
      <span id="r-status" class="status-pill"></span>
    </div>

    <div class="grid-2" style="font-size:14px; margin-bottom:20px; gap:12px;">
      <div>
        <span style="color:var(--t3);">From: </span>
        <span id="r-from" style="color:var(--t1);"></span>
      </div>
      <div>
        <span style="color:var(--t3);">To: </span>
        <span id="r-to" style="color:var(--t1);"></span>
      </div>
      <div>
        <span style="color:var(--t3);">Weight: </span>
        <span id="r-weight" style="color:var(--t1);"></span>
      </div>
      <div>
        <span style="color:var(--t3);">Booked on: </span>
        <span id="r-date" style="color:var(--t1);"></span>
      </div>
    </div>

    <div style="font-size:13px; color:var(--t3); margin-bottom:12px;">
      Status Timeline
    </div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const STATUSES = ['Booked', 'In Transit', 'Out for Delivery', 'Delivered'];

async function trackShipment() {
  const id = document.getElementById('trackInput').value.trim().toUpperCase();
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result').style.display    = 'none';

  if (!id) return;

  try {
    const s = await apiGet('/api/shipments/' + id);
    const currentStep = STATUSES.indexOf(s.status);

    document.getElementById('r-tid').textContent    = s.trackingId;
    document.getElementById('r-from').textContent   = s.senderName + ' (' + s.origin + ')';
    document.getElementById('r-to').textContent     = s.receiverName + ' (' + s.destination + ')';
    document.getElementById('r-weight').textContent = s.weight ? s.weight + ' kg' : 'N/A';
    document.getElementById('r-date').textContent   = formatDate(s.createdAt);

    const pill = document.getElementById('r-status');
    pill.textContent  = s.status;
    pill.className    = 'status-pill ' + statusClass(s.status);

    // Build timeline
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';
    STATUSES.forEach((step, i) => {
      const isLast = i === STATUSES.length - 1;
      let dotClass = i < currentStep ? 'done' : i === currentStep ? 'current' : 'pending';
      let lineClass = i < currentStep ? 'done' : '';

      tl.innerHTML += `
        <div class="t-step">
          ${!isLast ? `<div class="t-connector ${lineClass}"></div>` : ''}
          <div class="t-dot ${dotClass}">${i + 1}</div>
          <div class="t-label">${step}</div>
        </div>`;
    });

    document.getElementById('result').style.display = 'block';
  } catch {
    const err = document.getElementById('error-box');
    err.textContent = 'Shipment not found. Please check your tracking ID.';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
