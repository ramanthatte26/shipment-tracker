<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShipTrack — History</title>
  <link rel="stylesheet" href="./allStyles.css"/>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">▲ ShipTrack</a>
  <div class="nav-links">
    <a href="index.html"   class="nav-link">Home</a>
    <a href="create.html"  class="nav-link">Create</a>
    <a href="track.html"   class="nav-link">Track</a>
    <a href="history.html" class="nav-link active">History</a>
    <a href="admin.html"   class="nav-link">Admin</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">Shipment History</div>
  <div class="page-sub">All shipments sorted by latest first</div>

  <div class="filter-row" id="filters">
    <button class="filter-btn active" onclick="filterBy('All', this)">All</button>
    <button class="filter-btn" onclick="filterBy('Booked', this)">Booked</button>
    <button class="filter-btn" onclick="filterBy('In Transit', this)">In Transit</button>
    <button class="filter-btn" onclick="filterBy('Out for Delivery', this)">Out for Delivery</button>
    <button class="filter-btn" onclick="filterBy('Delivered', this)">Delivered</button>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tracking ID</th>
            <th>Sender</th>
            <th>Receiver</th>
            <th>Route</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" style="color:var(--t3); text-align:center; padding:30px;">
            Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
let allShipments = [];
let currentFilter = 'All';

async function loadHistory() {
  try {
    allShipments = await apiGet('/api/shipments');
    renderTable(allShipments);
  } catch {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6" style="color:#f09595; text-align:center; padding:30px;">' +
      'Failed to load shipments. Check server connection.</td></tr>';
  }
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:var(--t3); text-align:center; padding:30px;">No shipments found.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(s => `
    <tr>
      <td style="font-family:monospace; color:var(--p2);">${s.trackingId}</td>
      <td>${s.senderName}</td>
      <td>${s.receiverName}</td>
      <td style="color:var(--t3);">${s.origin} → ${s.destination}</td>
      <td><span class="status-pill ${statusClass(s.status)}">${s.status}</span></td>
      <td style="color:var(--t3); font-size:13px;">${formatDate(s.createdAt)}</td>
    </tr>`).join('');
}

function filterBy(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'All'
    ? allShipments
    : allShipments.filter(s => s.status === status);
  renderTable(filtered);
}

loadHistory();
</script>
</body>
</html>
